spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

blog:
  jwt:
    secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac
    expiration: 3600
  upload:
    path: ./uploads/test/
  cors:
    allowed-origin: http://localhost:5173
