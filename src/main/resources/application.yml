spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_bak?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

blog:
  jwt:
    secret: 8QmWn4vB3xTz9Lk2pR6sYd1Hj7Nc5Fa0UvE3Gi8Kb2Pw9Xt4Qm6Zn1Ls7Dh5Vr3C
    expiration: 604800
  upload:
    path: ./uploads/images/
  cors:
    allowed-origin: http://localhost:5173

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.blog: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: OFF
